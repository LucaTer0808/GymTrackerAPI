<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GymTracker - Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { color: #1c1e21; margin-top: 0; margin-bottom: 0.5rem; text-align: center; }
        p.subtitle { color: #606770; text-align: center; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 600; color: #4b4f56; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { border-color: #1877f2; outline: none; box-shadow: 0 0 0 2px #e7f3ff; }

        button { width: 100%; padding: 0.8rem; background: #00a400; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1rem; margin-top: 0.5rem; }
        button:hover { background: #008a00; }

        /* Polished Error Message */
        .error-container { background: #ffebe8; border: 1px solid #dd3c10; color: #dd3c10; padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1.2rem; display: flex; align-items: center; }
        .error-container svg { margin-right: 8px; flex-shrink: 0; }

        /* Success Message */
        .success-container { text-align: center; color: #1d1d1d; }
        .success-icon { font-size: 3rem; color: #00a400; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <!-- Success View -->
    <div th:if="${success}" class="success-container">
        <div class="success-icon">✓</div>
        <h2>All Set!</h2>
        <p>Your password has been successfully changed. You can now log in to the app.</p>
    </div>

    <!-- Form View -->
    <div th:if="${success == null}">
        <h2>New Password</h2>
        <p class="subtitle">Please choose a secure password for your account.</p>

        <!-- Polished Error Block -->
        <div th:if="${error}" class="error-container">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0a8 8 0 100 16A8 8 0 008 0zm.75 12h-1.5v-1.5h1.5V12zm0-3h-1.5V4h1.5v5z"/>
            </svg>
            <span th:text="${error}">Error message placeholder</span>
        </div>

        <form th:action="@{/auth/confirm-password-reset}" method="post">
            <input type="hidden" name="token" th:value="${token}" />

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter new password">
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirm Password</label>
                <input type="password" id="passwordConfirm" name="passwordConfirm" required placeholder="Repeat new password">
            </div>

            <button type="submit">Save Password</button>
        </form>
    </div>
</div>
</body>
</html>
