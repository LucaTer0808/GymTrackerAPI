<!DOCTYPE html>
<html xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)">
<head>
    <meta charset="UTF-8">
    <title>GymTracker - Passwort zurücksetzen</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #28a745; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .error { color: #dc3545; font-size: 0.8rem; margin-top: 0.5rem; }
        .success { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>Neues Passwort setzen</h2>

    <div th:if="${success}" class="success">
        Passwort erfolgreich geändert! Du kannst dich jetzt in der App einloggen.
    </div>

    <form th:if="${success == null}" th:action="@{/auth/confirm-password-reset}" method="post">
        <input type="hidden" name="token" th:value="${token}" />

        <div class="form-group">
            <label for="password">Neues Passwort</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="Mind. 8 Zeichen">
        </div>

        <div class="form-group">
            <label for="passwordConfirm">Passwort bestätigen</label>
            <input type="password" id="passwordConfirm" name="passwordConfirm" required>
        </div>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <button type="submit">Passwort speichern</button>
    </form>
</div>
</body>
</html>
