services:
  db:
    image: postgres:17-alpine
    container_name: gymtracker-db
    environment:
      - POSTGRES_DB=gymtracker
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gymtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: gymtracker-api
    env_file:
      - .env
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: gymtracker-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # später für HTTPS:
      # - ./certs:/etc/letsencrypt
    depends_on:
      - api

volumes:
  db_data: